services:
  - type: web
    name: alirtiqaa
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && gunicorn improvement.wsgi:application --workers 2 --threads 2 --timeout 120"
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: alirtiqaa-db
          property: connectionString

databases:
  - name: alirtiqaa-db
    plan: free
    databaseName: alirtiqaa
    user: alirtiqaa
